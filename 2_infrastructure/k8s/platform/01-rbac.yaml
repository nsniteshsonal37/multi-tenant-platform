---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-service
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-role
  namespace: platform
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-rolebinding
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-role
subjects:
  - kind: ServiceAccount
    name: gateway-service
    namespace: platform
