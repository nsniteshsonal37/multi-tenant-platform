# Replace TENANT_ID with the actual tenant identifier before applying.
# This file is applied by the Jenkins tenant-provision pipeline.
# Manual apply: sed 's/TENANT_ID/acme/g' 00-namespace.yaml | kubectl apply -f -
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-TENANT_ID
  labels:
    hrs/tenant-id: TENANT_ID
    app.kubernetes.io/managed-by: terraform
