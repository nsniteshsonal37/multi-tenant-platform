---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/managed-by: terraform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000
      resource/add_cluster:
        attributes:
          - key: service.cluster
            value: hrs-platform
            action: insert
          - key: deployment.environment
            value: ${ENVIRONMENT}
            action: insert

    exporters:
      otlp/newrelic:
        endpoint: https://otlp.eu01.nr-data.net:4317
        headers:
          api-key: ${NEW_RELIC_LICENSE_KEY}
        compression: gzip

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resource/add_cluster, batch]
          exporters: [otlp/newrelic]
        metrics:
          receivers: [otlp]
          processors: [resource/add_cluster, batch]
          exporters: [otlp/newrelic]
        logs:
          receivers: [otlp]
          processors: [resource/add_cluster, batch]
          exporters: [otlp/newrelic]
---
# Secret: create this before applying the deployment
# kubectl create secret generic otel-collector-secret \
#   --namespace=observability \
#   --from-literal=NEW_RELIC_LICENSE_KEY=<your_key>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - --config=/conf/otel-collector-config.yaml
          ports:
            - containerPort: 4317
              name: grpc
            - containerPort: 4318
              name: http
          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: otel-collector-secret
                  key: NEW_RELIC_LICENSE_KEY
            - name: ENVIRONMENT
              value: production
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
  type: ClusterIP
